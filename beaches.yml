name: Update Beach Status

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch-beaches:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get token and fetch beaches
        env:
          CLIENT_ID: ${{ secrets.MVDAPI_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.MVDAPI_CLIENT_SECRET }}
        run: |
          echo "Getting token..."
          TOKEN=$(curl -s -X POST \
            "https://mvdapi-auth.montevideo.gub.uy/auth/realms/pci/protocol/openid-connect/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=${CLIENT_ID}&client_secret=${CLIENT_SECRET}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['access_token'])")
          
          if [ -z "$TOKEN" ]; then
            echo "ERROR: empty token"
            exit 1
          fi
          echo "Token OK (${#TOKEN} chars)"
          
          echo "Fetching beaches..."
          curl -s \
            "https://api.montevideo.gub.uy/api/beaches/lifeguardstations" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/json" \
            -o beaches_raw.json
          
          python3 - << 'PYEOF'
          import json
          from datetime import datetime, timezone
          with open('beaches_raw.json') as f:
              data = json.load(f)
          out = {"updated": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"), "beaches": data}
          with open('beaches.json', 'w') as f:
              json.dump(out, f, ensure_ascii=False, indent=2)
          print(f"OK: {len(data)} stations")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add beaches.json
          git diff --staged --quiet || git commit -m "Beach status $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
