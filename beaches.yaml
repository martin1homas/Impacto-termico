name: Update Beach Status
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  fetch-beaches:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch beaches
        env:
          CID: ${{ secrets.MVDAPI_CLIENT_ID }}
          CSC: ${{ secrets.MVDAPI_CLIENT_SECRET }}
        run: |
          BODY=$(curl -s -X POST \
            "https://mvdapi-auth.montevideo.gub.uy/auth/realms/pci/protocol/openid-connect/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=${CID}&client_secret=${CSC}")
          echo "Response: ${BODY:0:200}"
          TOKEN=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          curl -s "https://api.montevideo.gub.uy/api/beaches/lifeguardstations" \
            -H "Authorization: Bearer ${TOKEN}" \
            -o beaches_raw.json
          python3 -c "
import json,sys
from datetime import datetime,timezone
d=json.load(open('beaches_raw.json'))
json.dump({'updated':datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),'beaches':d},open('beaches.json','w'),ensure_ascii=False)
print(f'OK: {len(d)} stations')
"
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add beaches.json
          git diff --staged --quiet || git commit -m "Beach status $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
